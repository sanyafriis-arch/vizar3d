<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIZAR 3D | Архитектурная визуализация</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent: #ffffff;
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Главный экран */
        header.hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #161616 0%, #0a0a0a 100%);
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 200;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: clamp(0.8rem, 2vw, 1.1rem);
            color: var(--text-dim);
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }

        /* Сетка проектов */
        section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 40px;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 50px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-left: 3px solid var(--accent);
            padding-left: 20px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
        }

        .project-card {
            position: relative;
            aspect-ratio: 16 / 10;
            background-color: var(--card-bg);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            opacity: 0;
            transform: translateY(30px);
            transition: var(--transition);
        }

        .project-card.visible { opacity: 1; transform: translateY(0); }

        .project-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
            filter: grayscale(30%);
        }

        .project-card:hover img { transform: scale(1.08); filter: grayscale(0%); }

        .project-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
            display: flex;
            align-items: flex-end;
            padding: 30px;
            opacity: 0;
            transition: var(--transition);
        }

        .project-card:hover .project-overlay { opacity: 1; }

        /* Просмотр фото */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            cursor: zoom-out;
        }

        .lightbox.active { display: flex; }
        .lightbox img { max-width: 100%; max-height: 100%; border-radius: 4px; }

        footer { padding: 80px 20px; text-align: center; color: #444; font-size: 0.8rem; }

        @media (max-width: 600px) {
            .projects-grid { grid-template-columns: 1fr; }
            section { padding: 60px 20px; }
        }
    </style>
</head>
<body>

<header class="hero">
    <h1>VIZAR 3D</h1>
    <div class="subtitle">Архитектурная визуализация</div>
</header>

<section id="work">
    <h2>Проекты</h2>
    <div class="projects-grid" id="grid"></div>
</section>

<div class="lightbox" id="lightbox">
    <img src="" alt="Full view" id="lightbox-img">
</div>

<footer>© 2026 VIZAR 3D</footer>

<script>
    // ТВОЙ СПИСОК ФАЙЛОВ
    const gallery = [
        { file: "hero.jpg", title: "Главный проект" },
        { file: "img1.jpg", title: "Визуализация экстерьера" },
        { file: "img2.jpg", title: "Интерьерное решение" },
        { file: "img3.jpg", title: "Детали объекта" }
    ];

    const grid = document.getElementById('grid');
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');

    gallery.forEach((item) => {
        const card = document.createElement('div');
        card.className = 'project-card';
        
        // Указываем путь к папке img
        const imagePath = "img/" + item.file; 

        card.innerHTML = `
            <img src="${imagePath}" alt="${item.title}" loading="lazy">
            <div class="project-overlay">
                <div class="project-info">
                    <p style="font-size: 0.7rem; color: #ccc; text-transform: uppercase; letter-spacing: 1px;">Project</p>
                    <p style="font-weight: 400; letter-spacing: 1px;">${item.title}</p>
                </div>
            </div>
        `;
        
        card.onclick = () => {
            lbImg.src = imagePath;
            lightbox.classList.add('active');
        };
        
        grid.appendChild(card);
    });

    lightbox.onclick = () => lightbox.classList.remove('active');

    // Анимация появления
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.project-card').forEach(card => observer.observe(card));
</script>

</body>
</html>

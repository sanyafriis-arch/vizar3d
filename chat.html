<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mila AI</title>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 85%; font-size: 16px; line-height: 1.4; position: relative; }
        .u { background: #222; align-self: flex-end; border-bottom-right-radius: 4px; color: #eee; }
        .a { background: linear-gradient(135-deg, #fff 0%, #ddd 100%); color: #000; align-self: flex-start; border-bottom-left-radius: 4px; font-weight: 500; }
        .input-area { padding: 15px; background: #111; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; outline: none; font-size: 16px; }
        button { width: 45px; height: 45px; background: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; color: #000; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="m" placeholder="Напиши Миле...">
        <button onclick="send()">↑</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const m = document.getElementById('m');

        async function send() {
            if(!m.value) return;
            const text = m.value;
            chat.innerHTML += `<div class="msg u">${text}</div>`;
            m.value = '';
            chat.scrollTop = chat.scrollHeight;

            try {
                // ЗАМЕНИ localhost НА СВОЙ IP ТУТ:
                const res = await fetch('http://192.168.0.106/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: "Ты — Мила, красивая и умная девушка. Ты увлекаешься 3D-дизайном и архитектурой. Твой характер: веселая, иногда дерзкая, общаешься как живой человек, без официоза." },
                            { role: "user", content: text }
                        ],
                        temperature: 0.7
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                chat.innerHTML += `<div class="msg a">${reply}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (e) {
                chat.innerHTML += `<div class="msg a">Мила спит... (Проверь сервер на компе)</div>`;
            }
        }
        m.addEventListener("keypress", (e) => { if (e.key === "Enter") send(); });
    </script>
</body>
</html>
